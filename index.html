<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>Rita App</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            user-select: none;
            -webkit-user-select: none;
            background-color: #000;
        }
        @media (orientation: landscape) {
            body {
                flex-direction: row;
            }
        }

        /* Startskärm som täcker hela appen och hanterar helskärm */
        #start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        #start-btn {
            padding: 25px 60px;
            font-size: 7vw;
            font-family: sans-serif;
            font-weight: bold;
            color: white;
            background-color: #34c759;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            transition: transform 0.1s;
        }
        #start-btn:active {
            transform: scale(0.95);
        }
        @media (orientation: landscape) {
            #start-btn {
                font-size: 7vh;
            }
        }

        /* Ritytan tar exakt 80% */
        #canvas-container {
            flex: 0 0 80%;
            height: 80%;
            position: relative;
            background-color: #fff;
        }
        @media (orientation: landscape) {
            #canvas-container {
                flex: 0 0 80%;
                height: 100%;
            }
        }
        #viewCanvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none; /* Hindrar att svep/zoom stör ritandet */
        }

        /* Panel med 4x2-rutnät: 6 färger + RENSA som upptar 2 celler.
           Stående: 4 kolumner x 2 rader. Liggande: 2 kolumner x 4 rader.
           Placeringen är explicit i båda lägena så att varje färg
           hamnar på samma fysiska plats när man roterar. */
        #button-container {
            flex: 0 0 20%;
            height: 20%;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(2, 1fr);
            background-color: #1c1c1e;
            padding: 6px;
            gap: 6px;
        }
        @media (orientation: landscape) {
            #button-container {
                flex: 0 0 20%;
                height: 100%;
                grid-template-columns: repeat(2, 1fr);
                grid-template-rows: repeat(4, 1fr);
            }
        }

        /* --- Placering i stående läge (grid-area: rad / kol) --- */
        .c-svart { grid-area: 1 / 1; }
        .c-rod   { grid-area: 1 / 2; }
        .c-gul   { grid-area: 1 / 3; }
        .c-bla   { grid-area: 2 / 1; }
        .c-gron  { grid-area: 2 / 2; }
        .c-lila  { grid-area: 2 / 3; }
        #undo-btn  { grid-area: 1 / 4; } /* Ångra: övre cellen till höger */
        #clear-btn { grid-area: 2 / 4; } /* Rensa: nedre cellen till höger */

        /* --- Placering i liggande läge (90° rotation av rutnätet) --- */
        @media (orientation: landscape) {
            .c-gul   { grid-area: 2 / 1; }
            .c-rod   { grid-area: 3 / 1; }
            .c-svart { grid-area: 4 / 1; }
            .c-lila  { grid-area: 2 / 2; }
            .c-gron  { grid-area: 3 / 2; }
            .c-bla   { grid-area: 4 / 2; }
            #undo-btn  { grid-area: 1 / 1; } /* Ångra: överst till vänster */
            #clear-btn { grid-area: 1 / 2; } /* Rensa: överst till höger */
        }

        .color-box {
            width: 100%;
            height: 100%;
            cursor: pointer;
            border-radius: 10px;
            /* Ovalda färger tonas ner en aning (behåller färgen, blir bara
               mörkare) så att den aktiva färgen syns tydligt. Kanten gör
               att även svart syns mot panelen. */
            filter: brightness(0.6);
            border: 2px solid rgba(255,255,255,0.2);
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.12s ease, box-shadow 0.15s ease, border-color 0.15s ease, filter 0.15s ease;
        }
        .color-box.selected {
            filter: brightness(1);
            border-color: #ffffff;
            transform: scale(1.08);
            box-shadow: 0 0 14px rgba(255,255,255,0.6);
            z-index: 2;
        }

        /* Systemknappen (Rensa) */
        .sys-btn {
            width: 100%;
            height: 100%;
            color: white;
            border: none;
            border-radius: 10px;
            font-family: sans-serif;
            font-weight: bold;
            font-size: clamp(13px, 3.5vw, 26px);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        @media (orientation: landscape) {
            .sys-btn {
                font-size: clamp(13px, 3.2vh, 26px);
            }
        }

        #undo-btn { background-color: #3a3a3c; }
        #undo-btn:disabled { opacity: 0.4; cursor: default; }
        #clear-btn { background-color: #3a3a3c; }
        #clear-btn.confirm { background-color: #ff3b30; }
    </style>
</head>
<body>

<div id="start-overlay">
    <button id="start-btn" onclick="startApp()">STARTA</button>
</div>

<div id="canvas-container">
    <canvas id="viewCanvas"></canvas>
</div>

<div id="button-container">
    <div class="color-box c-svart selected" style="background-color: #000000;" onclick="selectColor('#000000', this)"></div>
    <div class="color-box c-rod"   style="background-color: #ff3b30;" onclick="selectColor('#ff3b30', this)"></div>
    <div class="color-box c-gul"   style="background-color: #ffcc00;" onclick="selectColor('#ffcc00', this)"></div>
    <div class="color-box c-bla"   style="background-color: #007aff;" onclick="selectColor('#007aff', this)"></div>
    <div class="color-box c-gron"  style="background-color: #34c759;" onclick="selectColor('#34c759', this)"></div>
    <div class="color-box c-lila"  style="background-color: #af52de;" onclick="selectColor('#af52de', this)"></div>
    <button id="undo-btn" class="sys-btn" onclick="undo()" disabled>ÅNGRA</button>
    <button id="clear-btn" class="sys-btn" onclick="handleClearClick()">RENSA</button>
</div>

<script>
    const viewCanvas = document.getElementById('viewCanvas');
    const vCtx = viewCanvas.getContext('2d');

    const paper = document.createElement('canvas');
    paper.width = 900;
    paper.height = 1200;
    const pCtx = paper.getContext('2d');

    pCtx.fillStyle = '#ffffff';
    pCtx.fillRect(0, 0, paper.width, paper.height);

    let isDrawing = false;
    let lastX = 0;
    let lastY = 0;
    let currentColor = '#000000';
    const lineWidth = 20;
    let clearState = 0;
    let clearTimer = null;
    const MAX_UNDO = 15;   // Hur många steg bakåt man kan ångra
    let undoStack = [];

    function resizeCanvas() {
        const container = document.getElementById('canvas-container');
        if (!container) return;
        viewCanvas.width = container.clientWidth;
        viewCanvas.height = container.clientHeight;
        render();
    }

    function render() {
        const W = viewCanvas.width;
        const H = viewCanvas.height;
        if (W === 0 || H === 0) return;
        vCtx.clearRect(0, 0, W, H);

        if (W < H) {
            vCtx.drawImage(paper, 0, 0, W, H);
        } else {
            vCtx.save();
            vCtx.translate(0, H);
            vCtx.rotate(-Math.PI / 2);
            vCtx.scale(H / 900, W / 1200);
            vCtx.drawImage(paper, 0, 0);
            vCtx.restore();
        }
    }

    function getPaperCoords(e) {
        const rect = viewCanvas.getBoundingClientRect();
        let clientX, clientY;

        if (e.touches && e.touches.length > 0) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }

        const x = clientX - rect.left;
        const y = clientY - rect.top;

        const W = viewCanvas.width;
        const H = viewCanvas.height;

        if (W < H) {
            return { x: (x / W) * 900, y: (y / H) * 1200 };
        } else {
            return { x: ((H - y) / H) * 900, y: (x / W) * 1200 };
        }
    }

    function startDrawing(e) {
        isDrawing = true;
        pushUndo(); // Spara läget innan strecket så att ÅNGRA fungerar
        const coords = getPaperCoords(e);
        lastX = coords.x;
        lastY = coords.y;

        pCtx.beginPath();
        pCtx.fillStyle = currentColor;
        pCtx.arc(lastX, lastY, lineWidth / 2, 0, Math.PI * 2);
        pCtx.fill();

        render();
        resetClearButton();
    }

    function draw(e) {
        if (!isDrawing) return;
        if (e.cancelable) e.preventDefault();

        const coords = getPaperCoords(e);

        pCtx.beginPath();
        pCtx.strokeStyle = currentColor;
        pCtx.lineWidth = lineWidth;
        pCtx.lineCap = 'round';
        pCtx.lineJoin = 'round';
        pCtx.moveTo(lastX, lastY);
        pCtx.lineTo(coords.x, coords.y);
        pCtx.stroke();

        lastX = coords.x;
        lastY = coords.y;

        render();
    }

    function stopDrawing() {
        isDrawing = false;
    }

    function selectColor(color, element) {
        currentColor = color;
        const boxes = document.querySelectorAll('.color-box');
        boxes.forEach(box => box.classList.remove('selected'));
        element.classList.add('selected');
        resetClearButton();
    }

    function handleClearClick() {
        const btn = document.getElementById('clear-btn');
        if (clearState === 0) {
            clearState = 1;
            btn.textContent = 'SÄKER?';
            btn.classList.add('confirm');
            // Återställ automatiskt om man inte bekräftar
            clearTimer = setTimeout(resetClearButton, 2500);
        } else {
            pushUndo(); // Gör även RENSA ångerbart
            pCtx.fillStyle = '#ffffff';
            pCtx.fillRect(0, 0, paper.width, paper.height);
            render();
            resetClearButton();
        }
    }

    function resetClearButton() {
        clearState = 0;
        if (clearTimer) {
            clearTimeout(clearTimer);
            clearTimer = null;
        }
        const btn = document.getElementById('clear-btn');
        if (btn) {
            btn.textContent = 'RENSA';
            btn.classList.remove('confirm');
        }
    }

    function pushUndo() {
        try {
            undoStack.push(pCtx.getImageData(0, 0, paper.width, paper.height));
            if (undoStack.length > MAX_UNDO) undoStack.shift();
        } catch (e) { /* ignorera om bilden inte kan läsas */ }
        updateUndoState();
    }

    function undo() {
        if (undoStack.length === 0) return;
        const img = undoStack.pop();
        pCtx.putImageData(img, 0, 0);
        render();
        resetClearButton();
        updateUndoState();
    }

    function updateUndoState() {
        const btn = document.getElementById('undo-btn');
        if (btn) btn.disabled = (undoStack.length === 0);
    }

    // Starta appen och trigga helskärm via användarklick
    function startApp() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(err => {
                console.log(`Helskärm misslyckades: ${err.message}`);
            });
        }
        document.getElementById('start-overlay').style.display = 'none';
        setTimeout(resizeCanvas, 100);
    }

    // Bevakar om helskärm lämnas (t.ex. vid systemsvep)
    document.addEventListener('fullscreenchange', () => {
        if (!document.fullscreenElement) {
            // Visar startskärmen på nytt för smidig återaktivering
            document.getElementById('start-overlay').style.display = 'flex';
        } else {
            document.getElementById('start-overlay').style.display = 'none';
        }
        setTimeout(resizeCanvas, 100);
    });

    viewCanvas.addEventListener('mousedown', startDrawing);
    viewCanvas.addEventListener('mousemove', draw);
    window.addEventListener('mouseup', stopDrawing);

    viewCanvas.addEventListener('touchstart', startDrawing, { passive: false });
    viewCanvas.addEventListener('touchmove', draw, { passive: false });
    window.addEventListener('touchend', stopDrawing);

    window.addEventListener('resize', resizeCanvas);

    resizeCanvas();

    // Registrera service worker (gör appen installerbar och offline-duglig)
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
            navigator.serviceWorker.register('sw.js').catch(function () {});
        });
    }
</script>

</body>
</html>
